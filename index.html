<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NSW Journey Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --blue: #0072CE; --blue-hover: #005BAA; --blue-light: #EBF4FF;
  --green: #059669; --red: #DC2626; --amber: #D97706;
  --bg: #F3F4F6; --card: #FFFFFF;
  --text: #111827; --sub: #4B5563; --muted: #9CA3AF;
  --border: #E5E7EB; --border-focus: #93C5FD;
  --input-bg: #F9FAFB;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
  --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
  --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.05);
  --r: 16px; --r-sm: 10px;
}
html, body { min-height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; -webkit-tap-highlight-color: transparent; scroll-behavior: smooth; }
.app { max-width: 600px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; background: var(--bg); position: relative; }

/* Header */
header { background: rgba(0, 114, 206, 0.95); backdrop-filter: blur(8px); padding: 16px 20px; position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow-md); }
.hdr { display: flex; align-items: center; justify-content: space-between; }
.hdr-brand { display: flex; align-items: center; gap: 12px; }
.hdr-logo { width: 36px; height: 36px; background: rgba(255,255,255,0.2); border-radius: var(--r-sm); display: flex; align-items: center; justify-content: center; font-size: 18px; }
.hdr-title { font-size: 16px; font-weight: 700; color: #fff; letter-spacing: -0.01em; }
.hdr-sub { font-size: 11px; color: rgba(255,255,255,0.75); margin-top: 2px; }
.hdr-right { display: flex; align-items: center; gap: 10px; }
.lang-btn { padding: 6px 12px; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.2); border-radius: var(--r-sm); color: #fff; font-size: 12px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
.lang-btn:hover { background: rgba(255,255,255,0.25); }
.live-pill { display: flex; align-items: center; gap: 6px; padding: 4px 10px; background: rgba(255,255,255,0.15); border-radius: 20px; font-size: 11px; font-weight: 600; color: #fff; }
.ldot { width: 6px; height: 6px; border-radius: 50%; background: #4ADE80; animation: pulse 1.5s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
#clock { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: rgba(255,255,255,0.8); }

/* Alerts */
.alert-strip { background: #FEF3C7; border-bottom: 1px solid #FDE68A; padding: 10px 20px; font-size: 13px; color: #92400E; cursor: pointer; display: none; align-items: center; gap: 12px; transition: background 0.2s; }
.alert-strip:hover { background: #FDE68A; }
.alert-strip.show { display: flex; }
.alert-strip-txt { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 500; }
.alert-badge { background: var(--amber); color: #fff; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 12px; flex-shrink: 0; }
.alert-panel { background: #FFFBEB; border-bottom: 1px solid #FDE68A; padding: 16px 20px; display: none; }
.alert-panel.show { display: block; }
.alert-item { padding: 10px 0; border-bottom: 1px solid #FDE68A; font-size: 13px; color: #92400E; }
.alert-item:last-child { border-bottom: none; padding-bottom: 0; }
.aline { font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px; color: #fff; background: #E4002B; margin-right: 4px; display: inline-block; }
.alert-footer { font-size: 11px; color: #B45309; margin-top: 12px; text-align: center; font-weight: 500; }

.content { flex: 1; padding: 16px; }

/* Tabs */
.tabs { display: flex; background: #E5E7EB; border-radius: 14px; padding: 4px; margin-bottom: 20px; }
.tab { flex: 1; padding: 10px 4px; border: none; border-radius: 10px; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; color: var(--sub); background: transparent; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); display: flex; align-items: center; justify-content: center; gap: 6px; }
.tab.active { background: var(--card); color: var(--blue); box-shadow: var(--shadow-sm); }

/* Card & Forms */
.card { background: var(--card); border-radius: var(--r); padding: 20px; margin-bottom: 16px; box-shadow: var(--shadow-md); border: 1px solid rgba(0,0,0,0.02); }
.flabel { font-size: 11px; letter-spacing: 0.05em; text-transform: uppercase; color: var(--sub); font-weight: 700; margin-bottom: 8px; }
.inputs-container { display: flex; flex-direction: column; }
.srow { display: flex; flex-direction: column; }
/* Swap button sits in its own row between inputs — no longer absolute/overlapping */
.swap-row { display: flex; justify-content: center; padding: 6px 0; }
/* FIX: .input-wrap is positioning context for .sic, .clear-btn and .sugs */
.input-wrap { position: relative; }
.sic { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 14px; pointer-events: none; z-index: 1; }
/* Clear (×) button inside the input, right side */
.clear-btn { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); width: 22px; height: 22px; background: var(--muted); border: none; border-radius: 50%; color: #fff; font-size: 11px; font-weight: 700; cursor: pointer; display: none; align-items: center; justify-content: center; transition: background 0.15s; z-index: 2; line-height: 1; padding: 0; }
.clear-btn.vis { display: flex; }
.clear-btn:hover { background: var(--sub); }
.si { width: 100%; padding: 14px 42px 14px 40px; background: var(--input-bg); border: 1.5px solid var(--border); border-radius: 12px; color: var(--text); font-family: 'Inter', sans-serif; font-size: 15px; outline: none; transition: all 0.2s; -webkit-appearance: none; }
.si:focus { background: #fff; border-color: var(--blue); box-shadow: 0 0 0 4px var(--blue-light); }
.si::placeholder { color: var(--muted); }
.si.sel { background: #fff; border-color: var(--border-focus); font-weight: 500; }
.swap-btn { width: auto; height: auto; display: inline-flex; align-items: center; justify-content: center; gap: 6px; background: #fff; border: 1.5px solid var(--border); border-radius: 20px; color: var(--sub); font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; box-shadow: var(--shadow-sm); padding: 7px 16px; font-family: 'Inter', sans-serif; }
.swap-btn:hover { background: var(--blue-light); color: var(--blue); border-color: var(--blue); transform: none; }

/* Suggestions */
.sugs { position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: #fff; border: 1px solid var(--border); border-radius: 12px; z-index: 300; max-height: 240px; overflow-y: auto; box-shadow: var(--shadow-lg); display: none; }
.sug { padding: 12px 16px; cursor: pointer; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); transition: background 0.1s; font-size: 14px; font-weight: 500; color: var(--text); }
.sug:last-child { border-bottom: none; }
.sug:hover, .sug.highlighted { background: var(--blue-light); color: var(--blue); }
.sug-ic { font-size: 16px; opacity: 0.8; flex-shrink: 0; }

/* Modes */
.modes-section { margin-bottom: 16px; }
.modes-label { font-size: 11px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; color: var(--sub); display: block; margin-bottom: 8px; padding: 0 2px; }
.modes { display: flex; gap: 6px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; padding-bottom: 2px; }
.modes::-webkit-scrollbar { display: none; }
.mb { flex-shrink: 0; padding: 8px 16px; background: #fff; border: 1.5px solid var(--border); border-radius: 24px; color: var(--sub); font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.2s; white-space: nowrap; display: inline-flex; align-items: center; gap: 5px; }
.mb:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-light); }
.mb.on { background: var(--blue); border-color: var(--blue); color: #fff; }

/* Buttons */
.btn { width: 100%; padding: 16px; background: var(--blue); color: #fff; border: none; border-radius: 14px; font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; -webkit-appearance: none; box-shadow: var(--shadow-md); }
.btn:hover { background: var(--blue-hover); transform: translateY(-1px); box-shadow: var(--shadow-lg); }
.btn:active { transform: translateY(1px); box-shadow: var(--shadow-sm); }

/* Refresh Bar */
.refresh-bar { background: var(--card); border-radius: var(--r); padding: 16px; margin-bottom: 16px; box-shadow: var(--shadow-md); border: 1px solid rgba(0,0,0,0.03); }
.rtitle { font-size: 16px; font-weight: 700; color: var(--text); }
.rsub { font-size: 13px; color: var(--sub); margin-top: 4px; font-weight: 500; }
.auto-badge { font-size: 11px; color: var(--green); display: inline-flex; align-items: center; gap: 6px; font-weight: 600; background: #D1FAE5; padding: 6px 12px; border-radius: 12px; }

.fav-banner-btn { padding: 8px 16px; background: #FDE68A; border: none; border-radius: 10px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: 'Inter', sans-serif; color: #92400E; white-space: nowrap; transition: all 0.2s; }
.fav-banner-btn:hover { background: #FCD34D; }
.fav-banner-btn.saved { background: #D1FAE5; color: var(--green); border: 1.5px solid #A7F3D0; cursor: pointer; }
.fav-banner-btn.saved:hover { background: #FEE2E2; color: var(--red); border-color: #FECACA; }

/* Journey Cards */
.upcoming-marker { scroll-margin-top: 80px; }
.jcard { background: var(--card); border-radius: var(--r); padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow-md); border: 1px solid rgba(0,0,0,0.03); transition: all 0.2s ease; position: relative; overflow: hidden; }
.jcard:hover { border-color: var(--border-focus); transform: translateY(-1px); box-shadow: var(--shadow-lg); }
.jcard-top { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 12px; cursor: pointer; }

/* ── FIXED: two-column card grid so each platform sits under its station ── */
.jcard-grid { flex: 1; min-width: 0; display: grid; grid-template-columns: 1fr 18px 1fr; gap: 0 6px; align-items: start; }
.jcard-dep { min-width: 0; }
.jcard-arr { min-width: 0; text-align: right; }
.jcard-arrow { color: var(--muted); font-size: 13px; font-weight: 600; padding-top: 4px; text-align: center; }
.jtime { font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 700; color: var(--text); letter-spacing: -0.02em; line-height: 1; }
.jstation { font-size: 12px; font-weight: 600; color: var(--text); margin-top: 5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.jplat-dep { font-size: 11px; color: var(--blue); font-weight: 700; margin-top: 3px; min-height: 15px; }
.jplat-arr { font-size: 11px; color: var(--green); font-weight: 700; margin-top: 3px; min-height: 15px; text-align: right; }
.jdur { font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 8px; background: var(--blue-light); color: var(--blue); white-space: nowrap; flex-shrink: 0; align-self: flex-start; }

.jcard-row2 { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; cursor: pointer; }
.lbadge { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700; padding: 4px 8px; border-radius: 6px; white-space: nowrap; letter-spacing: -0.02em; }
.lwalk { font-size: 12px; color: var(--sub); font-weight: 500; display: flex; align-items: center; gap: 4px; }
.jtransfer { font-size: 12px; color: var(--sub); font-weight: 500; margin-left: auto; background: #F3F4F6; padding: 2px 8px; border-radius: 12px; }
.jexpand-btn { margin-top: 12px; background: #F9FAFB; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; font-size: 13px; color: var(--sub); font-family: 'Inter', sans-serif; font-weight: 600; padding: 8px; display: block; width: 100%; text-align: center; transition: all 0.2s; }
.jexpand-btn:hover { background: var(--blue-light); color: var(--blue); border-color: var(--blue-light); }

/* Legs Detail */
.legs-detail { display: none; margin-top: 12px; padding-top: 12px; border-top: 1px dashed var(--border); }
.leg-row { display: flex; align-items: flex-start; gap: 12px; padding: 6px 0; }
.lr-time { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 600; color: var(--text); min-width: 46px; flex-shrink: 0; padding-top: 2px; line-height: 1.4; }
.lr-dot { width: 12px; height: 12px; border-radius: 50%; border: 3px solid var(--blue); background: #fff; flex-shrink: 0; margin-top: 5px; position: relative; z-index: 2; }
.lr-dot.orig { background: var(--blue); box-shadow: 0 0 0 3px var(--blue-light); }
.lr-dot.dest { background: var(--green); border-color: var(--green); box-shadow: 0 0 0 3px #D1FAE5; }
.lr-body { flex: 1; min-width: 0; }
.lr-station { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
.lr-plat { font-size: 12px; color: var(--sub); font-weight: 500; }
.lr-badge { margin-bottom: 6px; display: inline-block; }
.leg-connector { display: flex; gap: 12px; padding: 0; position: relative; }
.lc-sp { min-width: 46px; flex-shrink: 0; }
.lc-line { width: 4px; background: var(--border); margin: 0 4px; flex-shrink: 0; min-height: 16px; border-radius: 2px; }
.lc-stops { flex: 1; padding: 4px 0; }
.lc-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; }
.lc-t { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 500; color: var(--muted); min-width: 42px; flex-shrink: 0; }
.lc-n { font-size: 13px; color: var(--sub); flex: 1; font-weight: 500; }
.lc-p { font-size: 11px; color: var(--muted); font-style: italic; }
.transfer-row { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: #FFFBEB; border-radius: 10px; margin: 8px 0; font-size: 13px; color: #B45309; font-weight: 600; border: 1px solid #FDE68A; }

/* Favourites Tab */
.fav-card { background: #fff; border-radius: var(--r); padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow-md); border: 1px solid rgba(0,0,0,0.03); transition: all 0.2s; }
.fav-card:hover { border-color: var(--border-focus); transform: translateY(-1px); box-shadow: var(--shadow-lg); }
.fav-card-top { display: flex; align-items: center; gap: 12px; }
.fav-route { flex: 1; }
.fav-from { font-size: 15px; font-weight: 700; color: var(--text); }
.fav-to { font-size: 13px; color: var(--sub); margin-top: 4px; font-weight: 500; }
.fav-actions { display: flex; gap: 8px; }
.fav-search-btn { padding: 10px 16px; background: var(--blue); border: none; border-radius: 10px; color: #fff; font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.2s; }
.fav-search-btn:hover { background: var(--blue-hover); }
.fav-search-btn.loading { opacity: 0.7; cursor: wait; }
.fav-del-btn { padding: 10px 14px; background: #F3F4F6; border: none; border-radius: 10px; font-size: 14px; cursor: pointer; transition: all 0.2s; }
.fav-del-btn:hover { background: #FEE2E2; }
.fav-results { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); display: none; }

/* Empty States & Feedback */
.state { padding: 40px 20px; text-align: center; background: #fff; border-radius: var(--r); box-shadow: var(--shadow-md); }
.state-ic { font-size: 32px; margin-bottom: 12px; }
.state-t { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
.state-s { font-size: 13px; color: var(--sub); line-height: 1.5; }
.err { padding: 12px 16px; color: var(--red); font-size: 13px; background: #FEF2F2; border: 1px solid #FECACA; border-radius: 12px; margin-top: 12px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
.spin-wrap { padding: 40px 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: var(--sub); font-size: 14px; font-weight: 500; background: #fff; border-radius: var(--r); box-shadow: var(--shadow-md); }
.spin { width: 24px; height: 24px; border: 3px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.fadein { animation: fi 0.3s ease-out forwards; }
@keyframes fi { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
/* Vehicle position marker inside expanded stop list */
.vehicle-marker { display: flex; align-items: center; gap: 7px; padding: 6px 10px; background: var(--blue-light); border-radius: 8px; margin: 4px 0; font-size: 11px; font-weight: 700; color: var(--blue); }
/* Past journey cards — coloured left border shows status at a glance */
.past-card { margin-bottom: 8px; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); border-left: 3px solid var(--amber); background: #F9FAFB; opacity: 0.88; }
.past-card.arrived { border-left-color: var(--green); opacity: 0.72; }
.past-card-inner { padding: 12px 14px 10px; }
.past-progress { height: 3px; background: #E5E7EB; }
.past-progress-fill { height: 100%; background: var(--amber); border-radius: 0 2px 2px 0; transition: width 0.6s ease; }
/* "Departs in X min" badge on upcoming cards */
.departs-tag { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 5px; white-space: nowrap; margin-left: 6px; vertical-align: middle; }
.dep-now  { background: var(--red);   color: #fff; }
.dep-soon { background: var(--amber); color: #fff; }
.dep-ok   { background: var(--blue-light); color: var(--blue); }
.confirm-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 500; display: flex; align-items: center; justify-content: center; padding: 20px; animation: fi 0.15s ease-out; }
.confirm-box { background: #fff; border-radius: 20px; padding: 24px; max-width: 300px; width: 100%; box-shadow: 0 24px 48px rgba(0,0,0,0.18); }
.confirm-icon { font-size: 28px; margin-bottom: 10px; }
.confirm-title { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
.confirm-body { font-size: 13px; color: var(--sub); margin-bottom: 20px; line-height: 1.5; overflow: hidden; text-overflow: ellipsis; }
.confirm-btns { display: flex; gap: 10px; }
.confirm-keep { flex: 1; padding: 12px; background: #F3F4F6; border: none; border-radius: 12px; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600; color: var(--sub); cursor: pointer; transition: background 0.15s; }
.confirm-keep:hover { background: #E5E7EB; }
.confirm-remove { flex: 1; padding: 12px; background: var(--red); border: none; border-radius: 12px; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600; color: #fff; cursor: pointer; transition: background 0.15s; }
.confirm-remove:hover { background: #B91C1C; }
::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 4px; }
@media (min-width: 601px) { .app { box-shadow: 0 0 50px rgba(0,0,0,0.1); border-radius: 24px; overflow: hidden; margin-top: 20px; margin-bottom: 20px; min-height: calc(100vh - 40px); } }

/* Cold-start banner */
.warm-banner { background: #EFF6FF; border-bottom: 1px solid #BFDBFE; padding: 10px 20px; font-size: 13px; color: #1E40AF; display: none; align-items: center; gap: 10px; font-weight: 500; }
.warm-banner.show { display: flex; }
.warm-spin { width: 14px; height: 14px; border: 2px solid #BFDBFE; border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0; }
/* Button loading state */
.btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none !important; box-shadow: var(--shadow-md) !important; }
/* Retry button */
.retry-btn { margin-top: 10px; padding: 10px 20px; background: var(--blue); border: none; border-radius: 10px; color: #fff; font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; transition: background 0.2s; }
.retry-btn:hover { background: var(--blue-hover); }
</style>
</head>
<body>
<div class="app">
<header>
  <div class="hdr">
    <div class="hdr-brand">
      <div class="hdr-logo">🚆</div>
      <div>
        <div class="hdr-title" id="hdr-title">NSW Journey Planner</div>
        <div class="hdr-sub" id="hdr-sub">Transport for NSW · Real-time</div>
      </div>
    </div>
    <div class="hdr-right">
      <button class="lang-btn" id="lang-btn" onclick="toggleLang()">한국어</button>
      <div class="live-pill"><span class="ldot"></span>LIVE</div>
      <span id="clock"></span>
    </div>
  </div>
</header>
<div class="warm-banner" id="warm-banner">
  <div class="warm-spin"></div>
  <span id="warm-text">Server starting up — first search may take ~20s</span>
</div>
<div class="alert-strip" id="alert-strip" onclick="toggleAlerts()">
  <span class="alert-strip-txt" id="alert-txt"></span>
  <span class="alert-badge" id="alert-badge"></span>
  <span id="alert-chev">▼</span>
</div>
<div class="alert-panel" id="alert-panel">
  <div id="alert-list"></div>
  <div class="alert-footer" id="alert-footer">Auto-updates every 60s · Cleared when TfNSW resolves the issue</div>
</div>

<div class="content">
  <div class="tabs">
    <button class="tab active" id="tab-journey" onclick="switchTab('journey')">🗺 <span data-i18n="tab_journey">Journey</span></button>
    <button class="tab" id="tab-favs" onclick="switchTab('favs')">⭐ <span data-i18n="tab_favs">Favourites</span></button>
  </div>

  <!-- ── JOURNEY PLANNER ── -->
  <div id="page-journey">
    <div class="card">
      <div class="inputs-container">
        <div class="srow" id="from-row">

<script>
// ── Backend (Render free tier — pre-warmed on load) ──────────────────────────
// NOTE: Render free tier cold-starts after ~15 min inactivity; pre-warm call
// below wakes it up so the first real request isn't delayed 50 s.
const PROXY = 'https://nsw-planner.onrender.com';

// Track whether the server has responded at least once this session.
let serverReady = false;
let warmPromise = null;

function showWarmBanner(show) {
  document.getElementById('warm-banner').classList.toggle('show', show);
}

function warmServer() {
  if (serverReady) return Promise.resolve();
  if (warmPromise) return warmPromise;
  showWarmBanner(true);
  warmPromise = fetch(PROXY + '/', { signal: AbortSignal.timeout(65000) })
    .then(() => { serverReady = true; showWarmBanner(false); })
    .catch(() => { showWarmBanner(false); warmPromise = null; });
  return warmPromise;
}
warmServer(); // fire immediately on page load

// ── Clock ────────────────────────────────────────────────────────────────────
setInterval(() => {

    new Date().toLocaleTimeString('en-AU', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

// ── Global journey cache for language re-render ───────────────────────────────
let currentJourneyData = null;
let currentPastJourneyData = null;

// ── i18n ─────────────────────────────────────────────────────────────────────
let lang = 'en';
const TM = {
  en: {

    no_favs_s:'경로 검색 후 "즐겨찾기 추가"를 눌러 저장하세요.',
    remove:'🗑️', search:'모든 수단 검색',
    on_time:'정시', delayed:'지연', cancelled:'취소',
    walk:'도보', changes:'환승',
    show_stops:'▼ 정거장 보기', hide_stops:'▲ 숨기기',
    transfer:'환승', walk_leg:'도보',
    already_departed:'⟵ 이미 출발함', upcoming_journeys:'📍 예정된 여정',
    journeys_count:'개 여정',

    alert_info:'60초마다 자동 업데이트 · TfNSW 해결 시 자동 삭제',
    from_ph:'출발역 입력…', to_ph:'도착역 입력…',
    auto_refresh:'자동 새로고침 중'
  }
};
function t(k) { return (TM[lang] || TM.en)[k] || TM.en[k] || k; }

function toggleLang() {
  lang = lang === 'en' ? 'ko' : 'en';
  document.getElementById('lang-btn').textContent = lang === 'en' ? '한국어' : 'English';
  applyLang();
}
function applyLang() {
  document.getElementById('hdr-title').textContent = t('hdr_title');
  document.getElementById('hdr-sub').textContent = t('hdr_sub');
  document.querySelectorAll('[data-i18n]').forEach(el => el.textContent = t(el.dataset.i18n));

    btn.textContent = btn.dataset.open === '1' ? t('hide_stops') : t('show_stops');
  });
  renderFavsPage();
  updateFavBanner();
  // Re-render journeys preserving doScroll=false intentionally (we're just relabelling)

}

// ── Tabs ──────────────────────────────────────────────────────────────────────
function switchTab(tab) {
  ['journey', 'favs'].forEach(p => {
    const pageEl = document.getElementById('page-' + p);
    if (pageEl) pageEl.style.display = p === tab ? 'block' : 'none';
    const tabEl = document.getElementById('tab-' + p);
    if (tabEl) tabEl.classList.toggle('active', p === tab);
  });
  if (tab === 'favs') renderFavsPage();
}

// ── Alerts ────────────────────────────────────────────────────────────────────
let alerts = []; let alertOpen = false;
async function loadAlerts() {
  try {
    const r = await fetch(PROXY + '/alerts'); if (!r.ok) return;
    const d = await r.json();
    alerts = d?.infos?.current || d?.infos || [];
    renderAlerts();
  } catch {}
}
function renderAlerts() {
  const strip = document.getElementById('alert-strip');
  if (!alerts.length) {
    strip.classList.remove('show');
    document.getElementById('alert-panel').classList.remove('show');
    return;
  }
  document.getElementById('alert-txt').textContent =
    alerts[0]?.subtitle || alerts[0]?.title || 'Service disruption';
  document.getElementById('alert-badge').textContent =
    alerts.length + ' alert' + (alerts.length > 1 ? 's' : '');
  strip.classList.add('show');
  document.getElementById('alert-list').innerHTML = alerts.slice(0, 3).map(i => {
    const lines = (i.properties?.affectedLines || [])
      .map(l => `<span class="aline">${l.shortName || l.name || ''}</span>`).join('');
    const body = i.content && i.content !== (i.subtitle || i.title)
      ? `<div style="color:var(--sub);font-size:12px;margin-top:4px">${i.content}</div>` : '';
    return `<div class="alert-item"><strong>${i.subtitle || i.title || ''}</strong>
      ${lines ? `<div style="margin-top:6px">${lines}</div>` : ''} ${body}</div>`;
  }).join('') + (alerts.length > 3
    ? `<div style="font-size:12px;color:var(--sub);padding-top:8px;font-weight:600;">+${alerts.length - 3} more</div>`
    : '');
}
function toggleAlerts() {
  alertOpen = !alertOpen;
  document.getElementById('alert-panel').classList.toggle('show', alertOpen);
  document.getElementById('alert-chev').textContent = alertOpen ? '▲' : '▼';
}
loadAlerts();
setInterval(loadAlerts, 60000);

// ── App state ─────────────────────────────────────────────────────────────────
const state = { from: { name: '', id: '' }, to: { name: '', id: '' } };
let activeMode = '';

// ── Mode selection (with 300 ms debounce to avoid rapid-fire requests) ────────
let modeSearchTimer = null;
function setMode(el, x) {
  activeMode = x;
  document.querySelectorAll('.modes-section .mb').forEach(b => b.classList.remove('on'));
  el.classList.add('on');

  const res = document.getElementById('journey-results');
  if (state.from.id && state.to.id && res && res.innerHTML.trim() !== '' && !res.querySelector('.err')) {
    clearTimeout(modeSearchTimer);
    modeSearchTimer = setTimeout(() => {
      res.innerHTML = `<div class="spin-wrap"><div class="spin"></div>Finding journeys…</div>`;
      clearInterval(journeyTimer);
      fetchJourneys(false);
      journeyTimer = setInterval(() => fetchJourneys(false), 30000);
    }, 300);
  }
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function cleanStationName(name) {
  if (!name) return '';
  return name.split(',')[0].trim();
}
// FIX: return '' when no platform keyword found — was returning the station name itself
function cleanPlatform(name) {
  if (!name) return '';
  const m = name.match(/(Platform|Stand|Wharf|Track)\s*[A-Z0-9]+/i);
  return m ? m[0] : '';
}
function fmt(iso) {
  if (!iso) return '--:--';
  const d = new Date(iso);
  return d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
}
// Stable card ID — built from PLANNED (scheduled) dep+arr times, not estimated.
// If we used estimated times, a 2-min delay would change the UID between refreshes
// and break expanded-card restoration.
function stableUid(depPlanned, arrPlanned) {
  const k = s => s ? s.replace(/\D/g, '').slice(0, 12) : '0';
  return 'j' + k(depPlanned) + k(arrPlanned).slice(-6);
}

// ── Delay helpers ─────────────────────────────────────────────────────────────
// Returns delay in whole display-minutes: positive = late, negative = early, 0 = on time.
// Uses getHours()/getMinutes() (the same values fmt() displays) so the badge number
// always matches what the user sees — avoids "+2m" next to times that look 1 min apart.
function delayMins(planned, estimated) {
  if (!planned || !estimated) return 0;
  const p = new Date(planned), e = new Date(estimated);
  const pMins = p.getHours() * 60 + p.getMinutes();
  const eMins = e.getHours() * 60 + e.getMinutes();
  let diff = eMins - pMins;
  if (diff < -720) diff += 1440; // handle midnight crossover
  if (diff >  720) diff -= 1440;
  return diff;
}

// Estimated departure for a leg — checks leg.origin first, then stopSequence[0]
// as fallback because TfNSW sometimes only populates estimated times at stop level.
function estDep(leg) {
  return leg?.origin?.departureTimeEstimated
      || leg?.stopSequence?.[0]?.departureTimeEstimated
      || leg?.origin?.departureTimePlanned;
}

// Estimated arrival for a leg — checks leg.destination first, then last stop in sequence.
function estArr(leg) {
  return leg?.destination?.arrivalTimeEstimated
      || leg?.stopSequence?.at(-1)?.arrivalTimeEstimated
      || leg?.destination?.arrivalTimePlanned;
}
// Inline coloured badge shown next to a time. Nothing rendered only if exactly on time.
function delayBadge(mins) {
  if (!mins) return '';  // 0 / null / undefined = on time, show nothing
  const late  = mins > 0;
  const label = late ? `+${mins}m` : `${mins}m`;
  const bg    = late ? 'var(--red)' : 'var(--green)';
  return `<span style="font-size:10px;font-weight:700;color:#fff;background:${bg};padding:2px 6px;border-radius:5px;margin-left:5px;vertical-align:middle;">${label}</span>`;
}
// Strikethrough scheduled time shown below when off-schedule.
// Skipped if planned and estimated round to the same displayed minute (avoids duplicate).
function plannedLine(planned, estimated) {
  const d = delayMins(planned, estimated);
  if (!d || !planned) return '';
  if (fmt(planned) === fmt(estimated)) return ''; // same minute display — don't duplicate
  return `<div style="font-size:10px;color:var(--muted);text-decoration:line-through;margin-top:1px;line-height:1;">${fmt(planned)}</div>`;
}
function dur(a, b) {
  if (!a || !b) return '--';
  const m = Math.round((new Date(b) - new Date(a)) / 60000);
  if (isNaN(m)) return '--';
  const h = Math.floor(m / 60), min = m % 60;
  return m < 60 ? m + t('min') : h + t('h') + (min ? ' ' + min + t('m') : '');
}
function isWalkLeg(l) { return l.transportation?.product?.class === 100 || !!l.isWalking; }

// Show or hide the × button based on whether the input has content
function setClearBtn(side, hasValue) {
  document.getElementById(side + '-clear')?.classList.toggle('vis', !!hasValue);
}

// ── Official TfNSW line colours ───────────────────────────────────────────────
function getLineColors(mot, nm) {
  const n = (nm || '').toUpperCase();
  const c = {
    'T1':{ bg:'#F99D1C', fg:'#000' }, 'T2':{ bg:'#0098CD', fg:'#fff' },
    'T3':{ bg:'#F37021', fg:'#fff' }, 'T4':{ bg:'#005AA3', fg:'#fff' },
    'T5':{ bg:'#C4258F', fg:'#fff' }, 'T7':{ bg:'#A1BA0A', fg:'#fff' },
    'T8':{ bg:'#009B77', fg:'#fff' }, 'T9':{ bg:'#D11F2F', fg:'#fff' },
    'M1':{ bg:'#009599', fg:'#fff' }, 'BMT':{ bg:'#F99D1C', fg:'#000' },
    'CCN':{ bg:'#D11F2F', fg:'#fff' }, 'SCO':{ bg:'#005AA3', fg:'#fff' },
    'HUN':{ bg:'#833134', fg:'#fff' }, 'SHL':{ bg:'#833134', fg:'#fff' },
    'L1':{ bg:'#E31837', fg:'#fff' }, 'L2':{ bg:'#E31837', fg:'#fff' },
    'L3':{ bg:'#E31837', fg:'#fff' }
  };
  if (c[n]) return c[n];
  const b = { 1:'#F99D1C', 2:'#009599', 4:'#E31837', 5:'#00B5EF', 7:'#7B4F9E', 9:'#00A54F', 11:'#FFD700' };
  const f = { 1:'#000',    2:'#fff',    4:'#fff',    5:'#fff',    7:'#fff',   9:'#fff',    11:'#000'   };
  return { bg: b[mot] || '#666', fg: f[mot] || '#fff' };
}

// ── Autocomplete ─────────────────────────────────────────────────────────────
const MOT_ICONS = { 1:'🚆', 2:'🚇', 4:'🚊', 5:'🚌', 7:'🚎', 9:'⛴', 11:'🚐' };
const deb         = {};
const sugData     = {};        // raw stop objects per side for event delegation + keyboard nav
const sugIdx      = {};        // highlighted row index per side
const resolveCache = {};       // memoised stop name → id

// Client-side stop search cache — serves cached results instantly on repeated/backspaced queries.
// Stores unfiltered stops; mode filter applied at render time so cache stays valid across mode changes.
const stopSearchCache = new Map();
const STOP_CACHE_TTL  = 5 * 60 * 1000; // 5 minutes

function onInput(el, side) {
  state[side].id = ''; state[side].name = ''; el.classList.remove('sel');
  const v = el.value.trim();
  setClearBtn(side, v.length > 0);
  if (v.length < 2) { closeSugs(side); return; }
  clearTimeout(deb[side]);
  deb[side] = setTimeout(() => searchStops(v, side), 150);
}

// FIX #2: removed dead 'board' branch; handles only 'from' and 'to'
function onFocus(side) {
  const el = document.getElementById(side + '-input');
  if (el && el.value.trim().length >= 2 && !state[side].id) {
    searchStops(el.value.trim(), side);
  }
}

// Keyboard nav: Esc closes, arrows navigate, Enter selects or (nothing highlighted) runs search
function onKey(e, side) {
  const box   = document.getElementById(side + '-sugs');
  const items = box ? [...box.querySelectorAll('.sug')] : [];
  if (e.key === 'Escape') { closeSugs(side); return; }
  if (e.key === 'ArrowDown' && items.length) {
    e.preventDefault();
    sugIdx[side] = Math.min((sugIdx[side] ?? -1) + 1, items.length - 1);
    items.forEach((it, i) => it.classList.toggle('highlighted', i === sugIdx[side]));
    return;
  }
  if (e.key === 'ArrowUp' && items.length) {
    e.preventDefault();
    sugIdx[side] = Math.max((sugIdx[side] ?? 0) - 1, -1);
    items.forEach((it, i) => it.classList.toggle('highlighted', i === sugIdx[side]));
    return;
  }
  if (e.key === 'Enter') {
    e.preventDefault();
    const idx = sugIdx[side] ?? -1;
    if (idx >= 0 && items[idx]) {
      const s = sugData[side]?.[idx];
      if (s) selectStop(side, s.name, s.properties?.stopId || s.id);
    } else {
      closeSugs(side);
      doSearch();
    }
  }
}

function closeSugs(side) {
  const el = document.getElementById(side + '-sugs');
  if (el) el.style.display = 'none';
  sugIdx[side] = -1;
}

async function searchStops(q, side) {
  const key    = q.toLowerCase();
  const cached = stopSearchCache.get(key);
  let stops;

  if (cached && Date.now() - cached.ts < STOP_CACHE_TTL) {
    // Serve from client cache — feels instant on backspace or repeated queries
    stops = cached.stops;
  } else {
    try {
      const r = await timedFetch(PROXY + '/stops?' + new URLSearchParams({ q }));
      if (!r.ok) return;
      const d = await r.json();
      stops = (d?.locations || [])
        .filter(l => l.type === 'stop' || l.type === 'platform')
        .sort((a, b) => (b.isBest?1:0)-(a.isBest?1:0) || (b.matchQuality||0)-(a.matchQuality||0));
      stopSearchCache.set(key, { stops, ts: Date.now() });
    } catch { return; }
  }

  // Mode filter applied at render time so the cached list stays valid when mode changes
  let filtered = stops;
  if (activeMode) {
    const excl = activeMode.split(',');
    filtered = stops.filter(s => {
      const cls = s.productClasses || [];
      return !cls.length || cls.some(c => !excl.includes(c.toString()));
    });
  }
  renderSugs(filtered.slice(0, 7), side);
}

// FIX #3: no more inline onclick with string interpolation — uses data-idx + event delegation
function renderSugs(stops, side) {
  const box = document.getElementById(side + '-sugs');
  if (!box) return;
  if (!stops.length) { box.style.display = 'none'; return; }
  sugData[side] = stops;
  sugIdx[side] = -1;
  box.innerHTML = stops.map((s, i) => {
    const icons = [...new Set((s.productClasses || []).map(c => MOT_ICONS[+c] || '').filter(Boolean))].join('');
    const esc = s.name.replace(/</g, '&lt;').replace(/>/g, '&gt;');
    return `<div class="sug" data-idx="${i}" data-side="${side}">
      <span class="sug-ic">${icons || '🚉'}</span>
      <span style="flex:1">${esc}</span>
    </div>`;
  }).join('');
  box.style.display = 'block';
  // Scroll the input into view so the keyboard doesn't cover the dropdown
  const inputEl = document.getElementById(side + '-input');
  if (inputEl) setTimeout(() => inputEl.scrollIntoView({ behavior: 'smooth', block: 'center' }), 80);
}

// When the virtual keyboard resizes the viewport, keep the focused input visible
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', () => {
    const focused = document.activeElement;
    if (focused && (focused.id === 'from-input' || focused.id === 'to-input')) {
      setTimeout(() => focused.scrollIntoView({ behavior: 'smooth', block: 'center' }), 60);
    }
  });
}

function selectStop(side, name, id) {
  state[side] = { name, id };
  const el = document.getElementById(side + '-input');
  if (el) { el.value = name; el.classList.add('sel'); }
  setClearBtn(side, true);
  closeSugs(side);
}

// FIX #3: event delegation for suggestion clicks
document.addEventListener('click', e => {
  const sug = e.target.closest('.sug[data-idx]');
  if (sug) {
    const side = sug.dataset.side;
    const idx = parseInt(sug.dataset.idx, 10);
    const s = sugData[side]?.[idx];
    if (s) selectStop(side, s.name, s.properties?.stopId || s.id);
    return;
  }
  if (!e.target.closest('#from-row')) closeSugs('from');
  if (!e.target.closest('#to-row')) closeSugs('to');
});

// Clear button: wipe input, reset state, stop timer if both fields now empty
function clearInput(side) {
  const el = document.getElementById(side + '-input');
  if (el) { el.value = ''; el.classList.remove('sel'); el.focus(); }
  state[side] = { name: '', id: '' };
  setClearBtn(side, false);
  closeSugs(side);
  if (!state.from.id && !state.to.id) { clearInterval(journeyTimer); journeyTimer = null; }
}

function swapStations() {
  const f = { ...state.from }, tt = { ...state.to };
  state.from = { ...tt }; state.to = { ...f };
  const fi = document.getElementById('from-input'), ti = document.getElementById('to-input');
  fi.value = state.from.name; ti.value = state.to.name;
  fi.classList.toggle('sel', !!state.from.id);
  ti.classList.toggle('sel', !!state.to.id);
  setClearBtn('from', !!state.from.name);
  setClearBtn('to',   !!state.to.name);
  // Re-search immediately if both stations are set and results are already visible
  const res = document.getElementById('journey-results');
  if (state.from.id && state.to.id && res && res.innerHTML.trim() && !res.querySelector('.err')) {
    res.innerHTML = `<div class="spin-wrap"><div class="spin"></div>Finding journeys…</div>`;
    clearInterval(journeyTimer);
    fetchJourneys(true);
    journeyTimer = setInterval(() => fetchJourneys(false), 30000);
  }
}

// FIX #11: memoised ID resolution
async function resolveId(name) {
  if (resolveCache[name]) return resolveCache[name];
  const r = await timedFetch(PROXY + '/stops?' + new URLSearchParams({ q: name }));
  if (!r.ok) return null;
  const d = await r.json();
  const stops = (d?.locations || [])
    .filter(l => l.type === 'stop' || l.type === 'platform')
    .sort((a, b) => (b.isBest ? 1 : 0) - (a.isBest ? 1 : 0) || (b.matchQuality || 0) - (a.matchQuality || 0));
  const id = stops[0]?.properties?.stopId || stops[0]?.id || null;
  if (id) resolveCache[name] = id;
  return id;
}

// Custom modal — avoids the ugly browser-native window.confirm().
// routeLabel: short description shown in the dialog body (e.g. "Parramatta → Central")
function showConfirm(routeLabel, onConfirm) {
  const overlay = document.createElement('div');
  overlay.className = 'confirm-overlay';
  overlay.innerHTML = `
    <div class="confirm-box">
      <div class="confirm-icon">⭐</div>
      <div class="confirm-title">Remove favourite?</div>

        <button class="confirm-keep" id="conf-keep">Keep it</button>
        <button class="confirm-remove" id="conf-rm">Remove</button>

  document.body.appendChild(overlay);
  const close = () => document.body.removeChild(overlay);
  overlay.querySelector('#conf-keep').onclick = close;

  // Tap outside to cancel
  overlay.addEventListener('click', e => { if (e.target === overlay) close(); });
}

// ── Journey Search ────────────────────────────────────────────────────────────
let journeyTimer = null;
// Clean up interval on page unload to prevent stale polling after navigation
window.addEventListener('beforeunload', () => clearInterval(journeyTimer));

// Fetch with an AbortController timeout — prevents indefinite hangs on cold/slow server
async function timedFetch(url, ms = 35000) {
  const ctrl = new AbortController();
  const tid = setTimeout(() => ctrl.abort(), ms);
  try {
    return await fetch(url, { signal: ctrl.signal });
  } finally {
    clearTimeout(tid);
  }
}

function setFindBtn(loading) {
  const btn = document.getElementById('find-btn');
  const txt = document.getElementById('find-btn-txt');
  if (!btn || !txt) return;
  btn.disabled = loading;
  txt.textContent = loading ? 'Searching…' : t('find');
}

async function doSearch() {
  const fn = document.getElementById('from-input').value.trim();
  const tn = document.getElementById('to-input').value.trim();
  if (!fn || !tn) {
    document.getElementById('journey-results').innerHTML = '<div class="err">⚠ Please enter both stations.</div>';
    return;
  }
  setFindBtn(true);
  clearInterval(journeyTimer);

  // If server hasn't responded yet, show a contextual message while we wait
  if (!serverReady) {
    document.getElementById('journey-results').innerHTML =
      `<div class="spin-wrap"><div class="spin"></div>Starting server… may take ~20s on first use</div>`;
    await warmServer().catch(() => {});
  }

  document.getElementById('journey-results').innerHTML =
    `<div class="spin-wrap"><div class="spin"></div>Finding journeys…</div>`;

  try {
    if (!state.from.id) state.from.id = await resolveId(fn);
    if (!state.to.id) state.to.id = await resolveId(tn);
    if (!state.from.id || !state.to.id) {
      document.getElementById('journey-results').innerHTML =
        `<div class="err">⚠ Station not found — please select from the dropdown suggestions.</div>`;
      setFindBtn(false);
      return;
    }
    await fetchJourneys(true);
    journeyTimer = setInterval(() => fetchJourneys(false), 30000);
  } catch (e) {
    const isTimeout = e.name === 'AbortError';
    const msg = isTimeout
      ? 'Request timed out — the server may be starting up. Please try again.'
      : e.message;
    document.getElementById('journey-results').innerHTML =
      `<div class="err" style="flex-direction:column;align-items:flex-start;gap:10px">
        <span>⚠ ${msg}</span>
        <button class="retry-btn" onclick="doSearch()">↺ Try again</button>
      </div>`;
  } finally {
    setFindBtn(false);
  }
}

async function fetchJourneys(doScroll = false) {
  const p = { from: state.from.id, to: state.to.id };
  if (activeMode) p.excl = activeMode;

  // Single query only — TfNSW already includes recently-departed services in the
  // standard response (typically 3-4 trips before the requested time).
  // The separate past query was the root cause of "wrong journey in already departed":
  // querying t-12min would return unrelated slow routes that happened to depart recently.
  const res = await timedFetch(PROXY + '/trip?' + new URLSearchParams(p));
  if (!res.ok) return;
  serverReady = true; // confirm server is alive after a successful trip call
  currentJourneyData     = await res.json();
  currentPastJourneyData = null;
  renderJourneys(currentJourneyData, null, doScroll);
}

function renderJourneys(data, _pastData, doScroll = false) {
  const allJourneysMap = new Map();
  (data?.journeys || []).forEach(j => {
    const legs = j.legs || []; if (!legs.length) return;
    // Use planned (scheduled) dep+arr as stable dedup key
    const depP = legs[0]?.origin?.departureTimePlanned;
    const arrP = legs[legs.length - 1]?.destination?.arrivalTimePlanned;
    if (!depP || !arrP) return;
    if (!allJourneysMap.has(`${depP}-${arrP}`)) allJourneysMap.set(`${depP}-${arrP}`, j);
  });

  // FIX #8: null guard in sort
  const allJourneys = Array.from(allJourneysMap.values()).sort((a, b) => {
    const depA = estDep(a.legs?.[0]);
    const depB = estDep(b.legs?.[0]);
    if (!depA || !depB) return 0;
    return new Date(depA) - new Date(depB);
  });

  const now2 = new Date();
  const PAST_SHOW_MINS = 10; // only show last 10 min in already-departed
  const pastJrns = allJourneys.filter(j => {
    const dep = estDep(j.legs[0]);
    if (!dep) return false;
    const depD = new Date(dep); const agoMins = (now2 - depD) / 60000;
    return depD < now2 && agoMins > 0 && agoMins <= PAST_SHOW_MINS;
  });
  const upcomingJrns = allJourneys.filter(j => {
    const dep = estDep(j.legs[0]);
    return dep && new Date(dep) >= now2;
  });

  if (!upcomingJrns.length && !pastJrns.length) {
    document.getElementById('journey-results').innerHTML = '<div class="err">No journeys found.</div>';
    return;
  }

  // ── Save which cards are currently expanded so auto-refresh doesn't collapse them ──
  // UIDs are now stable (based on dep+arr times) so the same journey keeps its ID
  // across refreshes even if the list order or length changes.
  const openCards = new Set(
    [...document.querySelectorAll('.legs-detail')]
      .filter(el => el.style.display === 'block')
      .map(el => el.id.replace(/-det$/, ''))
  );

  const fn    = document.getElementById('from-input').value;
  const tn    = document.getElementById('to-input').value;
  const saved = isFavJ(state.from.id, state.to.id);
  const now   = new Date().toLocaleTimeString('en-AU', { hour: '2-digit', minute: '2-digit' });

  let html = `<div class="refresh-bar fadein">
    <div class="rtitle">${fn} → ${tn}</div>
    <div class="rsub">${upcomingJrns.length + pastJrns.length} ${t('journeys_count')} · ${now}</div>
    <div style="display:flex;align-items:center;gap:10px;margin-top:12px;flex-wrap:wrap;">
      <button class="fav-banner-btn${saved ? ' saved' : ''}" id="fav-banner-btn" onclick="${saved ? 'removeFavJ()' : 'addFavJ()'}">${saved ? t('remove_fav') : t('add_fav')}</button>
      <div class="auto-badge"><span class="ldot"></span>${t('auto_refresh')}</div>
    </div>
  </div>`;

  if (pastJrns.length > 0) {
    html += `<div style="margin-bottom:16px" class="fadein">
      <div style="font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted);padding:4px 0 10px;border-bottom:1px solid var(--border);margin-bottom:10px">
        ${t('already_departed')}
      </div>`;
    pastJrns.forEach(j => {
      const legs = j.legs || [];
      const dep = estDep(legs[0]);
      const arr = estArr(legs[legs.length - 1]);
      const depPlanned = legs[0]?.origin?.departureTimePlanned || legs[0]?.stopSequence?.[0]?.departureTimePlanned;
      const arrPlanned = legs[legs.length - 1]?.destination?.arrivalTimePlanned || legs[legs.length - 1]?.stopSequence?.at(-1)?.arrivalTimePlanned;
      const depDelay   = delayMins(depPlanned, dep);
      const arrDelay   = delayMins(arrPlanned, arr);
      const firstTL = legs.find(l => !isWalkLeg(l)) || legs[0];
      const lastTL = [...legs].reverse().find(l => !isWalkLeg(l)) || legs[legs.length - 1];
      const origPlat = cleanPlatform(firstTL?.stopSequence?.[0]?.disassembledName || firstTL?.origin?.disassembledName || '');
      const destPlat = cleanPlatform(lastTL?.stopSequence?.at(-1)?.disassembledName || lastTL?.destination?.disassembledName || '');
      const origName = firstTL?.origin?.name || '';
      const destName = lastTL?.destination?.name || '';
      const now3 = new Date();
      const alreadyArrived = arr && new Date(arr) < now3;
      const ago = Math.floor((now3 - new Date(dep)) / 60000);
      const badges = legs.map(l => {
        if (isWalkLeg(l)) return '';
        const mot = l.transportation?.product?.class || 0;
        const nm = l.transportation?.disassembledName || l.transportation?.number || '';
        const { bg, fg } = getLineColors(mot, nm);
        return nm ? `<span class="lbadge" style="background:${bg};color:${fg};opacity:0.8">${nm}</span>` : '';
      }).filter(Boolean).join('<span style="color:var(--muted);font-size:11px;margin:0 4px">›</span>');
      const statusTxt = alreadyArrived ? t('arrived') : t('in_transit');
      const agoTxt    = ago < 1 ? 'just now' : `${ago}${t('m')} ${t('ago')}`;
      // Progress through the journey (for in-transit)
      const totalMins   = Math.max(1, Math.round((new Date(arr) - new Date(dep)) / 60000));
      const progressPct = alreadyArrived ? 100 : Math.min(100, Math.round((ago / totalMins) * 100));

      html += `<div class="past-card${alreadyArrived ? ' arrived' : ''}">
        <div class="past-card-inner">
          <div style="display:grid;grid-template-columns:1fr 18px 1fr;gap:0 6px;align-items:start;margin-bottom:8px;">
            <div style="min-width:0;">
              <div style="display:flex;align-items:center;flex-wrap:wrap;gap:2px;">
                <div class="jtime" style="font-size:15px;color:var(--sub);">${fmt(dep)}</div>${delayBadge(depDelay)}
              </div>
              ${plannedLine(depPlanned, dep)}
              <div class="jstation" style="color:var(--sub);margin-top:4px;">${cleanStationName(origName)}</div>
              <div class="jplat-dep" style="opacity:0.7;">${origPlat}</div>
            </div>
            <div style="color:var(--muted);font-size:13px;font-weight:600;padding-top:4px;text-align:center;">→</div>
            <div style="min-width:0;text-align:right;">
              <div style="display:flex;align-items:center;justify-content:flex-end;flex-wrap:wrap;gap:2px;">
                ${delayBadge(arrDelay)}<div class="jtime" style="font-size:15px;color:var(--sub);">${fmt(arr)}</div>
              </div>
              ${plannedLine(arrPlanned, arr)}
              <div class="jstation" style="color:var(--sub);margin-top:4px;">${cleanStationName(destName)}</div>
              <div class="jplat-arr" style="opacity:0.7;">${destPlat}</div>
            </div>
          </div>
          <div style="display:flex;align-items:center;justify-content:space-between;">
            <div style="font-size:11px;color:var(--muted);font-weight:500;">${statusTxt} · ${agoTxt}</div>
            <div style="display:flex;align-items:center;gap:6px;">
              <div style="font-size:12px;font-weight:700;color:var(--sub);">${dur(dep, arr)}</div>
              <div style="display:flex;gap:4px;">${badges}</div>
            </div>
          </div>
        </div>
        ${!alreadyArrived ? `<div class="past-progress"><div class="past-progress-fill" style="width:${progressPct}%"></div></div>` : ''}
      </div>`;
    });
    html += `</div>`;
  }

  if (upcomingJrns.length > 0) {
    const nextDep    = estDep(upcomingJrns[0].legs[0]);
    const nextMins   = nextDep ? Math.round((new Date(nextDep) - now2) / 60000) : null;
    const nextBadge  = nextMins !== null && nextMins <= 20
      ? `<span style="font-size:11px;font-weight:700;padding:2px 10px;border-radius:20px;background:${nextMins<=2?'var(--red)':nextMins<=5?'var(--amber)':'var(--blue)'};color:#fff;margin-left:8px;">${nextMins===0?'Now':'in '+nextMins+' min'}</span>`
      : '';
    html += `<div id="upcoming-marker" class="upcoming-marker fadein" style="border-top:3px solid var(--blue);margin-bottom:14px;padding-top:12px;display:flex;align-items:center;gap:4px;">
      <span style="font-size:12px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--blue)">${t('upcoming_journeys')}</span>${nextBadge}
    </div>`;
    upcomingJrns.forEach((j, idx) => {
      const legs = j.legs || [];
      const dep = estDep(legs[0]);
      const arr = estArr(legs[legs.length - 1]);
      const firstTL = legs.find(l => !isWalkLeg(l)) || legs[0];
      const lastTL = [...legs].reverse().find(l => !isWalkLeg(l)) || legs[legs.length - 1];
      const origPlat = cleanPlatform(firstTL?.stopSequence?.[0]?.disassembledName || firstTL?.origin?.disassembledName || '');
      const destPlat = cleanPlatform(lastTL?.stopSequence?.at(-1)?.disassembledName || lastTL?.destination?.disassembledName || '');
      const xfers = legs.filter(l => !isWalkLeg(l)).length - 1;
      const badges = legs.map(l => {
        if (isWalkLeg(l)) return `<span class="lwalk">🚶${Math.round((l.duration || 0) / 60)}${t('m')}</span>`;
        const mot = l.transportation?.product?.class || 0;
        const nm = l.transportation?.disassembledName || l.transportation?.number || '';
        const { bg, fg } = getLineColors(mot, nm);
        return nm ? `<span class="lbadge" style="background:${bg};color:${fg}">${nm}</span>` : '';
      }).filter(Boolean).join('<span style="color:var(--muted);font-size:12px;margin:0 3px">›</span>');
      const depP = legs[0]?.origin?.departureTimePlanned || legs[0]?.stopSequence?.[0]?.departureTimePlanned;
      const arrP = legs[legs.length-1]?.destination?.arrivalTimePlanned || legs[legs.length-1]?.stopSequence?.at(-1)?.arrivalTimePlanned;
      const uid  = stableUid(depP, arrP);
      const minsUntil  = dep ? Math.round((new Date(dep) - now2) / 60000) : null;
      html += buildJCard(uid, dep, arr, firstTL, lastTL, origPlat, destPlat, legs, badges, xfers, true, idx, minsUntil);
    });
  }

  document.getElementById('journey-results').innerHTML = html;

  // ── Restore previously expanded cards after the DOM is rebuilt ────────────
  openCards.forEach(uid => {
    const det = document.getElementById(uid + '-det');
    const btn = document.getElementById(uid + '-btn');
    if (det && btn) {
      det.style.display = 'block';
      btn.dataset.open  = '1';
      btn.textContent   = t('hide_stops');
    }
  });

  if (doScroll && pastJrns.length > 0) {
    setTimeout(() => {
      const marker = document.getElementById('upcoming-marker');
      if (marker) marker.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 150);
  }
}

// ── FIXED: shared card builder — platforms under their own station column ──────
function buildJCard(uid, dep, arr, firstTL, lastTL, origPlat, destPlat, legs, badges, xfers, animate, animIdx = 0, minsUntil = null) {
  const origName = cleanStationName(firstTL?.origin?.name || '');
  const destName = cleanStationName(lastTL?.destination?.name || '');
  const anim     = animate ? `animation-delay:${animIdx * 0.05}s` : '';

  const depPlanned = legs[0]?.origin?.departureTimePlanned || legs[0]?.stopSequence?.[0]?.departureTimePlanned;
  const arrPlanned = legs[legs.length-1]?.destination?.arrivalTimePlanned || legs[legs.length-1]?.stopSequence?.at(-1)?.arrivalTimePlanned;
  const depDelay   = delayMins(depPlanned, dep);
  const arrDelay   = delayMins(arrPlanned, arr);

  // "Departs in X min" badge — shown on all upcoming services
  let departsTag = '';
  if (minsUntil !== null && minsUntil >= 0) {
    const cls   = minsUntil <= 2 ? 'dep-now' : minsUntil <= 5 ? 'dep-soon' : 'dep-ok';
    const label = minsUntil === 0 ? 'Now' : `in ${minsUntil} min`;
    departsTag  = `<div style="margin-top:3px;"><span class="departs-tag ${cls}">${label}</span></div>`;
  }

  return `<div class="jcard fadein" style="${anim}">
    <div class="jcard-top" onclick="toggleJD('${uid}')">
      <div class="jcard-grid">
        <div class="jcard-dep">
          <div style="display:flex;align-items:center;gap:4px;flex-wrap:nowrap;">
            <div class="jtime">${fmt(dep)}</div>${delayBadge(depDelay)}
          </div>
          ${plannedLine(depPlanned, dep)}${departsTag}
          <div class="jstation">${origName}</div>
          <div class="jplat-dep">${origPlat}</div>
        </div>
        <div class="jcard-arrow" style="padding-top:2px;">→</div>
        <div class="jcard-arr">
          <div style="display:flex;align-items:center;justify-content:flex-end;gap:4px;flex-wrap:nowrap;">
            ${delayBadge(arrDelay)}<div class="jtime">${fmt(arr)}</div>
          </div>
          ${plannedLine(arrPlanned, arr)}
          <div class="jstation">${destName}</div>
          <div class="jplat-arr">${destPlat}</div>
        </div>
      </div>
      <div class="jdur">${dur(dep, arr)}</div>
    </div>
    <div class="jcard-row2" onclick="toggleJD('${uid}')">${badges}${xfers > 0 ? `<span class="jtransfer">${xfers} ${t('changes')}${xfers > 1 ? 's' : ''}</span>` : ''}</div>
    <button class="jexpand-btn" id="${uid}-btn" data-xbtn data-open="0" onclick="toggleJD('${uid}')">${t('show_stops')}</button>
    <div class="legs-detail" id="${uid}-det">${buildLegs(legs)}</div>
  </div>`;
}

function toggleJD(uid) {
  const d = document.getElementById(uid + '-det');
  const btn = document.getElementById(uid + '-btn');
  if (!d || !btn) return;
  const open = d.style.display === 'block';
  d.style.display = open ? 'none' : 'block';
  btn.dataset.open = open ? '0' : '1';
  btn.textContent = open ? t('show_stops') : t('hide_stops');
}

// FIX #1: duration is in seconds from the TfNSW API — use /60 consistently
// Vehicle-type icon for position marker
const VEHICLE_ICON = {1:'🚆',2:'🚇',4:'🚊',5:'🚌',7:'🚎',9:'⛴',11:'🚐'};

function buildLegs(legs) {
  const now = new Date();
  let html = '';

  legs.forEach((leg, li) => {
    if (isWalkLeg(leg)) {
      const m = Math.round((leg.duration || 0) / 60);
      html += `<div class="transfer-row">🚶 ${t('walk_leg')} ${m} ${t('min')}</div>`;
      return;
    }

    const mot      = leg.transportation?.product?.class || 0;
    const nm       = leg.transportation?.disassembledName || leg.transportation?.number || '';
    const { bg, fg } = getLineColors(mot, nm);
    const vIcon    = VEHICLE_ICON[mot] || '🚌';
    const depT     = estDep(leg);
    const depTPlan = leg.origin?.departureTimePlanned;
    const arrT     = estArr(leg);
    const arrTPlan = leg.destination?.arrivalTimePlanned;
    const depD     = delayMins(depTPlan, depT);
    const arrD     = delayMins(arrTPlan, arrT);
    const seq      = leg.stopSequence || [];

    // ── Vehicle position ───────────────────────────────────────────────────
    // hasDeparted: service has left the origin
    // lastPassedIdx: last stop in seq whose departure time is in the past
    // hasArrived: service has reached the destination
    const hasDeparted  = depT  && new Date(depT)  <= now;
    const hasArrived   = arrT  && new Date(arrT)  <= now;
    const isInTransit  = hasDeparted && !hasArrived;

    let lastPassedIdx = hasDeparted ? 0 : -1; // origin counts as passed once departed
    if (seq.length > 1) {
      for (let i = 1; i < seq.length - 1; i++) {
        const st = seq[i].departureTimeEstimated || seq[i].departureTimePlanned;
        if (st && new Date(st) <= now) lastPassedIdx = i; else break;
      }
    }

    const isTransfer = li > 0 && !isWalkLeg(legs[li - 1]);
    if (isTransfer) html += `<div class="transfer-row">🔄 ${t('transfer')}: ${leg.origin?.name || ''}</div>`;

    const op = seq[0]?.disassembledName || leg.origin?.disassembledName || '';
    const depMins = depT ? Math.round((new Date(depT) - now) / 60000) : null;
    const depCountdown = (depMins !== null && depMins >= 0)
      ? `<span style="font-size:10px;font-weight:700;padding:2px 6px;border-radius:5px;margin-left:4px;vertical-align:middle;background:${depMins<=2?'var(--red)':depMins<=5?'var(--amber)':'var(--blue-light)'};color:${depMins<=5?'#fff':'var(--blue)'};">${depMins===0?'Now':'in '+depMins+' min'}</span>`
      : '';
    html += `<div class="leg-row">
      <div style="min-width:46px;flex-shrink:0;padding-top:2px;">
        <span class="lr-time">${fmt(depT)}</span>${delayBadge(depD)}
        ${plannedLine(depTPlan, depT)}${depCountdown}
      </div>
      <span class="lr-dot orig"></span>
      <div class="lr-body">
        <div class="lr-badge"><span class="lbadge" style="background:${bg};color:${fg}">${nm}</span></div>
        <div class="lr-station">${leg.origin?.name || ''}</div>
        ${op ? `<div class="lr-plat">${op}</div>` : ''}
      </div>
    </div>`;

    const mid = seq.slice(1, -1);
    html += `<div class="leg-connector"><div class="lc-sp"></div><div class="lc-line"></div><div class="lc-stops">`;

    if (mid.length) {
      let markerShown = false;
      mid.forEach((s, mi) => {
        const seqIdx = mi + 1; // index in full seq (0 = origin)
        const isPast = seqIdx <= lastPassedIdx;
        const ttEst  = s.departureTimeEstimated || s.arrivalTimeEstimated;
        const ttPlan = s.departureTimePlanned || s.arrivalTimePlanned || '';
        const tt     = ttEst || ttPlan;
        const sDelay = delayMins(ttPlan, tt);
        const sp     = s.disassembledName || '';

        // Insert vehicle marker just before the first upcoming stop
        if (isInTransit && !markerShown && !isPast) {
          markerShown = true;
          html += `<div class="vehicle-marker">${vIcon} En route · next stop ${s.name || ''}</div>`;
        }

        html += `<div class="lc-row" style="${isPast ? 'opacity:0.38;' : ''}">
          <div style="min-width:42px;flex-shrink:0;">
            <span class="lc-t">${fmt(tt)}</span>
            ${!isPast && sDelay ? `<div style="margin-top:1px;">${delayBadge(sDelay)}</div>` : ''}
          </div>
          <div style="flex:1;min-width:0;">
            <span class="lc-n">${s.name || ''}</span>
            ${sp ? `<span class="lc-p"> · ${sp}</span>` : ''}
          </div>
        </div>`;
      });

      // Vehicle past all intermediate stops but not yet at destination
      if (isInTransit && !markerShown) {
        html += `<div class="vehicle-marker">${vIcon} Approaching ${leg.destination?.name || 'destination'}</div>`;
      }
    } else if (isInTransit) {
      // No intermediate stops — show simple en-route marker
      html += `<div class="vehicle-marker" style="margin:8px 0;">${vIcon} En route to ${leg.destination?.name || 'destination'}</div>`;
    } else {
      html += `<div style="min-height:20px"></div>`;
    }

    html += `</div></div>`;

    const dp2 = seq.at(-1)?.disassembledName || leg.destination?.disassembledName || '';
    html += `<div class="leg-row">
      <div style="min-width:46px;flex-shrink:0;padding-top:2px;">
        <span class="lr-time">${fmt(arrT)}</span>${delayBadge(arrD)}
        ${plannedLine(arrTPlan, arrT)}
      </div>
      <span class="lr-dot dest"></span>
      <div class="lr-body">
        <div class="lr-station">${leg.destination?.name || ''}</div>
        ${dp2 ? `<div class="lr-plat">${dp2}</div>` : ''}
      </div>
    </div>`;
  });
  return html;
}

// ── Init ──────────────────────────────────────────────────────────────────────
renderFavsPage();
</script>
</body>
</html>
